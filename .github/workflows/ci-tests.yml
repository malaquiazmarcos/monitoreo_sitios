name: CI - Pruebas del monitoreo de APPS

on: 
  push:
    branches:
      - main

jobs: 
  ejecutar-tests:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar código del repo
        uses: actions/checkout@v4

      - name: Instalar Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar depencencias
        run: pip install -r requirements.txt

      - name: Ejecutar pytest
        run: python -m pytest tests/test_ping.py